<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SchneiderStudios – KI-Kurs</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#f5f5f7;--white:#fff;--ink:#1d1d1f;--deep:#0a0a0a;
  --edge:#d2d2d7;--dim:#6e6e73;--blue:#0071e3;--blue2:#0077ed;
  --green:#34c759;--orange:#ff9500;--red:#ff3b30;--purple:#af52de;
  --serif:'DM Serif Display',serif;--sans:'DM Sans',sans-serif;
  --sh:0 2px 14px rgba(0,0,0,.07);--sh2:0 10px 36px rgba(0,0,0,.12);
}
html{-webkit-font-smoothing:antialiased;}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);min-height:100vh;}

/* NAV */
.nav{height:52px;background:rgba(245,245,247,.92);backdrop-filter:saturate(200%) blur(20px);border-bottom:1px solid rgba(0,0,0,.08);display:flex;align-items:center;justify-content:space-between;padding:0 22px;position:sticky;top:0;z-index:90;}
.nav-logo{font-family:var(--serif);font-size:15px;color:var(--ink);}
.nav-logo em{color:var(--blue);font-style:normal;}
.nav-tabs{display:flex;gap:2px;}
.ntab{padding:6px 12px;border-radius:8px;border:none;background:transparent;color:var(--dim);font-size:13px;font-weight:500;cursor:pointer;font-family:var(--sans);transition:all .2s;}
.ntab.on{background:rgba(0,113,227,.1);color:var(--blue);}
.nav-r{display:flex;align-items:center;gap:8px;}
.lsw{display:flex;background:var(--white);border-radius:99px;padding:2px;border:1px solid var(--edge);}
.lb{font-size:11px;font-weight:700;padding:4px 11px;border-radius:99px;background:none;border:none;cursor:pointer;color:var(--dim);font-family:var(--sans);transition:all .2s;}
.lb.on{background:var(--blue);color:#fff;}
.nav-ava{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer;overflow:hidden;border:2px solid transparent;transition:all .2s;}
.nav-ava:hover{border-color:var(--blue);}
.nav-ava img{width:100%;height:100%;object-fit:cover;border-radius:50%;}

/* PAGES */
.pg{display:none;max-width:960px;margin:0 auto;padding:28px 18px 80px;}
.pg.on{display:block;animation:fup .4s ease both;}
@keyframes fup{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}

/* HOME */
.home-hero{background:var(--deep);border-radius:22px;padding:46px 42px;color:#fff;margin-bottom:22px;position:relative;overflow:hidden;box-shadow:var(--sh2);}
.home-hero::before{content:'';position:absolute;top:-40%;right:-10%;width:600px;height:600px;background:radial-gradient(circle,rgba(0,113,227,.17),transparent 65%);pointer-events:none;}
.home-hero::after{content:'';position:absolute;bottom:-30%;left:-5%;width:400px;height:400px;background:radial-gradient(circle,rgba(175,82,222,.1),transparent 65%);pointer-events:none;}
.hh-tag{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,.38);margin-bottom:14px;position:relative;}
.home-hero h1{font-family:var(--serif);font-size:clamp(26px,5vw,44px);font-weight:400;line-height:1.12;letter-spacing:-1px;margin-bottom:10px;position:relative;}
.home-hero h1 em{font-style:italic;color:var(--blue);}
.home-hero p{font-size:15px;opacity:.58;line-height:1.65;max-width:500px;position:relative;}
.stats3{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-bottom:20px;}
.sc{background:var(--white);border-radius:15px;padding:16px;text-align:center;box-shadow:var(--sh);}
.sc-v{font-family:var(--serif);font-size:30px;color:var(--blue);}
.sc-l{font-size:12px;color:var(--dim);margin-top:2px;}
.opbar{background:var(--white);border-radius:15px;padding:17px 20px;display:flex;align-items:center;gap:16px;margin-bottom:24px;box-shadow:var(--sh);}
.op-i{flex:1;}
.op-l{font-size:12px;color:var(--dim);font-weight:500;margin-bottom:7px;}
.pbo{background:var(--edge);border-radius:99px;height:7px;overflow:hidden;}
.pbi{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--blue),var(--purple));transition:width .7s cubic-bezier(.4,0,.2,1);}
.op-p{font-family:var(--serif);font-size:21px;color:var(--blue);min-width:46px;text-align:right;flex-shrink:0;}
.sec-l{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--dim);margin-bottom:13px;}

/* MODULE CARDS */
.mc{background:var(--white);border-radius:17px;overflow:hidden;margin-bottom:10px;box-shadow:var(--sh);transition:box-shadow .2s;}
.mc:hover{box-shadow:var(--sh2);}
.mc.done{box-shadow:0 2px 14px rgba(52,199,89,.15);}
.mch{display:flex;align-items:center;gap:13px;padding:16px 18px;cursor:pointer;user-select:none;}
.mn{width:37px;height:37px;border-radius:10px;font-family:var(--serif);font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.mc-info{flex:1;min-width:0;}
.mc-tag{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:1px;}
.mc-t{font-size:14px;font-weight:600;line-height:1.3;}
.mc-mini{display:flex;align-items:center;gap:7px;margin-top:4px;}
.mb2{width:88px;height:3px;background:var(--edge);border-radius:99px;overflow:hidden;}
.mf2{height:100%;border-radius:99px;transition:width .4s;}
.mt2{font-size:11px;color:var(--dim);}
.mc-chev{font-size:15px;color:var(--dim);transition:transform .3s;flex-shrink:0;}
.mc.open .mc-chev{transform:rotate(180deg);}
.mc-body{max-height:0;overflow:hidden;transition:max-height .4s cubic-bezier(.4,0,.2,1);}
.mc-body.open{max-height:900px;}
.mc-bi{border-top:1px solid var(--bg);padding:10px 16px 13px;}
.lr{display:flex;align-items:center;gap:11px;padding:10px 11px;border-radius:10px;margin-bottom:4px;cursor:pointer;transition:background .15s;}
.lr:last-child{margin-bottom:0;}
.lr:hover{background:var(--bg);}
.lr.done{background:#f0fdf4;}
.lchk{width:21px;height:21px;border-radius:50%;border:1.5px solid var(--edge);display:flex;align-items:center;justify-content:center;font-size:10px;color:transparent;flex-shrink:0;transition:all .2s;}
.lr.done .lchk{background:var(--green);border-color:var(--green);color:#fff;}
.lic{font-size:17px;flex-shrink:0;}
.lt2{flex:1;font-size:13px;font-weight:500;}
.lr.done .lt2{color:var(--dim);}
.ld{font-size:11px;color:var(--dim);flex-shrink:0;}
.lpb{width:26px;height:26px;background:var(--blue);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:9px;flex-shrink:0;transition:all .2s;}
.lr:hover .lpb{transform:scale(1.1);}
.lr.done .lpb{background:var(--green);}

/* PLAYER */
.player{display:none;}
.player.on{display:block;}
.pw{max-width:820px;margin:0 auto;padding:0 18px 80px;}
.ptop{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--edge);margin-bottom:18px;}
.pt-mod{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px;}
.pt-ttl{font-family:var(--serif);font-size:17px;font-weight:400;}
.pt-dur{font-size:13px;color:var(--dim);}
.bbk{display:flex;align-items:center;gap:5px;padding:7px 15px;border-radius:99px;border:1.5px solid var(--edge);background:var(--white);font-size:13px;font-weight:500;cursor:pointer;color:var(--dim);font-family:var(--sans);transition:all .2s;}
.bbk:hover{border-color:var(--blue);color:var(--blue);}
.spb{height:3px;background:var(--edge);border-radius:99px;margin-bottom:18px;overflow:hidden;}
.spbf{height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));border-radius:99px;transition:width .4s ease;}

/* SLIDES */
.slide{display:none;background:var(--white);border-radius:20px;overflow:hidden;min-height:440px;flex-direction:column;animation:slin .35s ease both;box-shadow:var(--sh);}
.slide.on{display:flex;}
.slide.bk{animation:slbk .35s ease both;}
@keyframes slin{from{opacity:0;transform:translateX(30px);}to{opacity:1;transform:translateX(0);}}
@keyframes slbk{from{opacity:0;transform:translateX(-30px);}to{opacity:1;transform:translateX(0);}}
.sv{height:200px;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.sb{padding:24px 28px 30px;flex:1;}
.s-lb{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;opacity:.6;}
.s-ttl{font-family:var(--serif);font-size:clamp(18px,3vw,24px);font-weight:400;line-height:1.2;margin-bottom:12px;}
.s-tx{font-size:15px;line-height:1.8;color:#3a3a3c;}
.s-tx strong{color:var(--blue);}
.hl{background:#eff6ff;border-left:3px solid var(--blue);padding:10px 14px;border-radius:0 9px 9px 0;margin:10px 0;font-size:14px;line-height:1.68;}
.hl.g{background:#f0fdf4;border-color:var(--green);}
.hl.o{background:#fff8f0;border-color:var(--orange);}
.hl.r{background:#fff0f0;border-color:var(--red);}
.ex{background:#fff8f0;border:1.5px solid #f5c28a;border-radius:10px;padding:12px 14px;margin:10px 0;font-size:13px;line-height:1.7;}
.ex .xl{font-size:10px;font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.ex.g{background:#f0fdf4;border-color:#86efac;}.ex.g .xl{color:var(--green);}
.ex.de{background:#e8f4fd;border-color:#90c8f0;}.ex.de .xl{color:var(--blue);}
.gb{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0;}
.gbc{padding:10px 12px;border-radius:9px;border:1.5px solid var(--edge);font-size:13px;line-height:1.5;}
.gbc.g{background:#f0fdf4;border-color:#86efac;}.gbc.b{background:#fff0f0;border-color:#fca5a5;}
.gbc-l{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.gbc.g .gbc-l{color:var(--green);}.gbc.b .gbc-l{color:var(--red);}
.dcard{background:#e8f4fd;border:1.5px solid #90c8f0;border-radius:10px;padding:11px 13px;display:flex;align-items:center;gap:10px;margin:6px 0;font-size:13px;line-height:1.5;}
.dcard-ico{font-size:22px;flex-shrink:0;}
.dcard-name{font-weight:700;font-size:11px;color:var(--blue);margin-bottom:2px;}

/* CONTROLS */
.sctrl{display:flex;align-items:center;justify-content:space-between;margin:14px 0 20px;}
.dots{display:flex;gap:5px;align-items:center;}
.dot{width:7px;height:7px;border-radius:50%;background:var(--edge);cursor:pointer;transition:all .25s;}
.dot.on{width:20px;border-radius:4px;background:var(--blue);}
.dot.done{background:var(--green);}
.bn{display:flex;align-items:center;gap:5px;padding:9px 17px;border-radius:99px;border:1.5px solid var(--edge);background:var(--white);font-size:13px;font-weight:500;cursor:pointer;color:var(--ink);font-family:var(--sans);transition:all .2s;}
.bn:hover{border-color:var(--blue);color:var(--blue);}
.bn.p{background:var(--blue);color:#fff;border-color:var(--blue);box-shadow:0 4px 14px rgba(0,113,227,.3);}
.bn.p:hover{background:var(--blue2);}
.bn:disabled{opacity:.3;cursor:not-allowed;}
.done-box{background:var(--deep);border-radius:18px;padding:30px;text-align:center;display:none;animation:fup .5s ease;color:#fff;}
.done-box h3{font-family:var(--serif);font-size:24px;font-weight:400;margin-bottom:8px;}
.done-box p{opacity:.6;margin-bottom:22px;font-size:15px;}
.da{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.bw{padding:11px 22px;border-radius:99px;border:none;font-weight:600;font-size:14px;cursor:pointer;font-family:var(--sans);transition:all .2s;}
.bw.gr{background:var(--green);color:#fff;}
.bw.nl{background:rgba(255,255,255,.12);color:#fff;}

/* QUIZ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);z-index:200;display:flex;align-items:center;justify-content:center;padding:18px;opacity:0;pointer-events:none;transition:opacity .3s;}
.overlay.on{opacity:1;pointer-events:all;}
.qbox{background:var(--white);border-radius:20px;width:100%;max-width:520px;padding:28px;box-shadow:0 24px 80px rgba(0,0,0,.2);transform:scale(.95) translateY(14px);transition:transform .3s;}
.overlay.on .qbox{transform:scale(1) translateY(0);}
.qt{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.qmod{font-size:12px;color:var(--dim);font-weight:700;}
.qcl{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--edge);background:var(--bg);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--dim);transition:all .2s;}
.qcl:hover{background:var(--edge);}
.qst{font-size:12px;color:var(--dim);margin-bottom:12px;}
.qdts{display:flex;gap:5px;margin-bottom:18px;}
.qdot{height:3px;flex:1;border-radius:99px;background:var(--edge);transition:background .3s;}
.qdot.done{background:var(--green);}.qdot.on{background:var(--blue);}
.qq{font-family:var(--serif);font-size:19px;font-weight:400;line-height:1.35;margin-bottom:17px;}
.qos{display:flex;flex-direction:column;gap:8px;margin-bottom:14px;}
.qo{padding:12px 15px;border-radius:10px;border:1.5px solid var(--edge);cursor:pointer;font-size:14px;line-height:1.4;text-align:left;background:var(--bg);transition:all .2s;font-family:var(--sans);}
.qo:hover:not(:disabled){border-color:var(--blue);background:#eff6ff;}
.qo.ok{border-color:var(--green);background:#f0fdf4;color:#15803d;font-weight:600;}
.qo.no{border-color:var(--red);background:#fff0f0;color:var(--red);}
.qo:disabled{cursor:default;}
.qfb{font-size:14px;padding:10px 14px;border-radius:9px;margin-bottom:13px;display:none;line-height:1.6;}
.qfb.on{display:block;}.qfb.ok{background:#f0fdf4;color:#15803d;}.qfb.no{background:#fff0f0;color:var(--red);}
.qnxt{width:100%;padding:13px;border-radius:11px;border:none;background:var(--blue);color:#fff;font-family:var(--serif);font-size:17px;font-weight:400;cursor:pointer;display:none;transition:all .2s;box-shadow:0 4px 14px rgba(0,113,227,.3);}
.qnxt.on{display:block;}.qnxt:hover{background:var(--blue2);}

/* PROGRESS */
.prg-card{background:var(--white);border-radius:17px;padding:22px;box-shadow:var(--sh);margin-bottom:12px;}
.prg-card h3{font-family:var(--serif);font-size:19px;font-weight:400;margin-bottom:17px;}
.mpr{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--bg);}
.mpr:last-child{border-bottom:none;}
.mpr-n{width:33px;height:33px;border-radius:9px;font-family:var(--serif);font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.mpr-info{flex:1;}
.mpr-nm{font-size:13px;font-weight:600;margin-bottom:5px;}
.mpr-b{background:var(--edge);border-radius:99px;height:5px;overflow:hidden;}
.mpr-f{height:100%;border-radius:99px;transition:width .6s;}
.mpr-pct{font-size:13px;font-weight:700;min-width:33px;text-align:right;flex-shrink:0;}
.lmini{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:9px;margin-bottom:5px;font-size:13px;}
.lmini.w{background:#f0fdf4;}

/* PROFILE */
.prof-c{background:var(--white);border-radius:17px;padding:24px;box-shadow:var(--sh);margin-bottom:12px;}
.pr{display:flex;align-items:center;gap:18px;margin-bottom:22px;}
.pw2{position:relative;width:68px;height:68px;flex-shrink:0;}
.pav{width:68px;height:68px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-size:28px;overflow:hidden;border:3px solid var(--edge);}
.pav img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.pae{position:absolute;bottom:0;right:0;width:22px;height:22px;background:var(--blue);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;cursor:pointer;border:2px solid #fff;transition:background .2s;}
.pae:hover{background:var(--blue2);}
.pnd h2{font-family:var(--serif);font-size:20px;font-weight:400;margin-bottom:3px;}
.pnd p{font-size:14px;color:var(--dim);}
.flds{display:flex;flex-direction:column;gap:12px;}
.fl{display:flex;flex-direction:column;gap:5px;}
.fl label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--dim);}
.fi2{padding:11px 13px;border-radius:10px;border:1.5px solid var(--edge);background:var(--bg);font-size:14px;color:var(--ink);font-family:var(--sans);outline:none;transition:border-color .2s;}
.fi2:focus{border-color:var(--blue);}
.sbtn{margin-top:4px;padding:10px 22px;border-radius:99px;border:none;background:var(--blue);color:#fff;font-family:var(--sans);font-size:14px;font-weight:600;cursor:pointer;align-self:flex-start;transition:all .2s;box-shadow:0 4px 12px rgba(0,113,227,.3);}
.sbtn:hover{background:var(--blue2);}
.ach{background:var(--white);border-radius:17px;padding:22px;box-shadow:var(--sh);}
.ach h3{font-family:var(--serif);font-size:19px;font-weight:400;margin-bottom:15px;}
.bgs{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:8px;}
.bg{background:var(--bg);border:1.5px solid var(--edge);border-radius:12px;padding:12px 8px;text-align:center;transition:all .2s;}
.bg.e{border-color:#fbbf24;background:#fffbeb;}
.bi{font-size:24px;margin-bottom:5px;filter:grayscale(1);opacity:.35;}
.bg.e .bi{filter:none;opacity:1;}
.bn2{font-size:10px;font-weight:600;color:var(--dim);line-height:1.3;}
.bg.e .bn2{color:var(--ink);}

/* VISUALS */
.vg{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
.ve{font-size:68px;}
.v-chat{flex-direction:column;gap:8px;padding:14px 20px;}
.cb{max-width:200px;padding:8px 12px;border-radius:12px;font-size:12px;line-height:1.5;font-family:var(--sans);}
.cb.u{background:var(--blue);color:#fff;border-bottom-right-radius:4px;align-self:flex-end;}
.cb.a{background:#fff;border:1.5px solid #e5e5ea;border-bottom-left-radius:4px;}
.v-stp{gap:0;padding:8px 12px;}
.si2{display:flex;flex-direction:column;align-items:center;gap:4px;padding:0 5px;text-align:center;}
.si2-i{font-size:22px;}.si2-l{font-size:10px;font-weight:600;max-width:54px;line-height:1.3;}
.sa{font-size:16px;color:var(--orange);padding:0 2px;margin-top:-4px;}
.v-cmp{gap:7px;padding:11px;}
.cc{flex:1;background:#fff;border-radius:9px;padding:10px;border:1.5px solid var(--edge);text-align:center;font-size:11px;line-height:1.5;}
.cc-i{font-size:24px;margin-bottom:4px;}.cc-n{font-family:var(--serif);font-size:10px;margin-bottom:3px;}
.v-ltr{padding:14px;justify-content:center;}
.lm{background:#fff;border-radius:9px;padding:13px;width:230px;box-shadow:var(--sh);font-size:11px;line-height:1.7;}
.lm-f{font-weight:700;color:var(--purple);margin-bottom:5px;}
.v-dc{padding:14px;flex-direction:column;gap:8px;}

/* LOCK SCREEN */
.lock-screen{display:none;min-height:100vh;align-items:center;justify-content:center;flex-direction:column;text-align:center;padding:40px 24px;background:var(--bg);}
.lock-screen.on{display:flex;animation:fup .5s ease both;}
.lock-ico{font-size:56px;margin-bottom:24px;filter:drop-shadow(0 4px 12px rgba(0,0,0,.12));}
.lock-h{font-family:var(--serif);font-size:clamp(24px,5vw,38px);font-weight:400;letter-spacing:-1px;color:var(--ink);margin-bottom:12px;max-width:480px;}
.lock-p{font-size:16px;color:var(--dim);line-height:1.65;max-width:400px;margin-bottom:36px;}
.lock-btns{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;}
.lock-btn-p{background:var(--blue);color:#fff;border:none;border-radius:99px;padding:14px 32px;font-size:16px;font-weight:600;cursor:pointer;font-family:var(--sans);box-shadow:0 4px 18px rgba(0,113,227,.3);transition:all .2s;}
.lock-btn-p:hover{background:var(--blue2);}
.lock-btn-g{background:transparent;color:var(--blue);border:1.5px solid rgba(0,113,227,.3);border-radius:99px;padding:13px 30px;font-size:16px;font-weight:600;cursor:pointer;font-family:var(--sans);transition:all .2s;}
.lock-btn-g:hover{border-color:var(--blue);}
/* test bar */

// ══════════════════════════════════════
// STATE
// ══════════════════════════════════════
const MC = ['#0071e3','#ff9500','#34c759','#af52de'];
let S = {w:{},q:{},b:{},p:{name:'',city:'',goal:''},ava:''};
let cL=0, cSl=0, goB=false, qI=0, qD=false;
function save(){try{localStorage.setItem('ss4',JSON.stringify(S));}catch(e){}}
function load(){try{const s=localStorage.getItem('ss4');if(s)S=JSON.parse(s);}catch(e){}}

// ══════════════════════════════════════
// LANGUAGE
// ══════════════════════════════════════
let lang = localStorage.getItem('ss_lang')||'de';

function sL(l){
  lang=l; localStorage.setItem('ss_lang',l);
  document.documentElement.lang=l;
  document.getElementById('bde').classList.toggle('on',l==='de');
  document.getElementById('bru').classList.toggle('on',l==='ru');
  renderUI();
  renderHome();
  if(document.getElementById('player').classList.contains('on')){
    buildSlides(); renderSlide();
  }
  if(document.getElementById('pg-prog').classList.contains('on')) renderProg();
  if(document.getElementById('pg-prof').classList.contains('on')) renderProf();
}

function ui(){ return UI[lang]; }
function t(obj){ return (obj&&typeof obj==='object') ? obj[lang]||obj.de : String(obj||''); }

function renderUI(){
  const u=ui();
  const tabs=document.querySelectorAll('.ntab');
  u.nt.forEach((txt,i)=>{if(tabs[i]) tabs[i].textContent=txt;});
  document.getElementById('hh1').innerHTML=u.hh1;
  document.getElementById('hh2').textContent=u.hh2;
  document.getElementById('sc-done').textContent=u.stats[0];
  document.getElementById('sc-tot').textContent=u.stats[1];
  document.getElementById('sc-qz').textContent=u.stats[2];
  document.getElementById('op-lbl').textContent=u.prog;
  document.getElementById('sec-mods-l').textContent=u.mods;
  document.getElementById('btn-back').textContent=u.back;
  document.getElementById('btnprev').textContent=u.prev;
  document.getElementById('db-h').textContent=u.db[0];
  document.getElementById('db-p').textContent=u.db[1];
  document.getElementById('db-quiz').textContent=u.db[2];
  document.getElementById('db-back').textContent=u.db[3];
  document.getElementById('prg-h1').textContent=u.prg[0];
  document.getElementById('prg-h2').textContent=u.prg[1];
  document.getElementById('fl-name').textContent=u.prof[2];
  document.getElementById('fl-city').textContent=u.prof[3];
  document.getElementById('fl-goal').textContent=u.prof[4];
  document.getElementById('sbtn').textContent=u.prof[5];
  document.getElementById('ach-h').textContent=u.ach;
}

// ══════════════════════════════════════
// NAV / PAGES
// ══════════════════════════════════════
function goP(id, btn){
  if(id==='home'&&document.getElementById('player').classList.contains('on')) return;
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.ntab').forEach(t=>t.classList.remove('on'));
  document.getElementById('pg-'+id).classList.add('on');
  if(btn) btn.classList.add('on');
  if(id==='prog') renderProg();
  if(id==='prof') renderProf();
}

// ══════════════════════════════════════
// STATS
// ══════════════════════════════════════
function updStats(){
  const w=Object.keys(S.w).length, tot=LES.length;
  const pct=Math.round(w/tot*100), q=Object.keys(S.q).length;
  document.getElementById('sv-w').textContent=w;
  document.getElementById('sv-q').textContent=q;
  document.getElementById('pbar').style.width=pct+'%';
  document.getElementById('ppct').textContent=pct+'%';
  chkBadges(w,q,tot);
}

// ══════════════════════════════════════
// HOME
// ══════════════════════════════════════
function renderHome(){
  const mm=ui().mmod;
  const c=document.getElementById('mod-list');
  c.innerHTML='';
  mm.forEach((m,mi)=>{
    const idxs=LES.map((l,i)=>l.m===mi?i:-1).filter(i=>i>=0);
    const w=idxs.filter(i=>S.w[i]).length;
    const pct=Math.round(w/idxs.length*100);
    const done=w===idxs.length;
    const card=document.createElement('div');
    card.className='mc'+(done?' done':'');
    card.id=`mc-${mi}`;
    const lh=idxs.map(gi=>{
      const l=LES[gi];
      return`<div class="lr${S.w[gi]?' done':''}" onclick="openLesson(${gi})">
        <div class="lchk">✓</div><div class="lic">${l.ic}</div>
        <div class="lt2">${t(l.t)}</div><div class="ld">${l.d}</div>
        <div class="lpb">▶</div>
      </div>`;
    }).join('');
    card.innerHTML=`
      <div class="mch" onclick="togM(${mi})">
        <div class="mn" style="background:${MC[mi]}18;color:${MC[mi]}">${mi+1}</div>
        <div class="mc-info">
          <div class="mc-tag" style="color:${MC[mi]}">${m.tag}${done?' · ✅':''}</div>
          <div class="mc-t">${m.em} ${m.ttl}</div>
          <div class="mc-mini"><div class="mb2"><div class="mf2" style="width:${pct}%;background:${MC[mi]}"></div></div><div class="mt2">${w}/${idxs.length}</div></div>
        </div>
        <div class="mc-chev">▾</div>
      </div>
      <div class="mc-body" id="mb-${mi}"><div class="mc-bi">${lh}</div></div>`;
    c.appendChild(card);
  });
}

function togM(mi){
  const b=document.getElementById(`mb-${mi}`);
  const c=document.getElementById(`mc-${mi}`);
  const o=b.classList.contains('open');
  document.querySelectorAll('.mc-body').forEach(x=>x.classList.remove('open'));
  document.querySelectorAll('.mc').forEach(x=>x.classList.remove('open'));
  if(!o){b.classList.add('open');c.classList.add('open');}
}

// ══════════════════════════════════════
// PLAYER
// ══════════════════════════════════════
function openLesson(gi){
  cL=gi; cSl=0; goB=false;
  const l=LES[gi]; const mi=l.m;
  const mm=ui().mmod;
  document.getElementById('pt-mod').style.color=MC[mi];
  document.getElementById('pt-mod').textContent=mm[mi].tag;
  document.getElementById('pt-ttl').textContent=t(l.t);
  document.getElementById('pt-dur').textContent='⏱ '+l.d;
  buildSlides();
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.getElementById('player').classList.add('on');
  document.getElementById('done-box').style.display='none';
  document.getElementById('sctrl').style.display='flex';
  window.scrollTo(0,0);
  renderSlide();
}

function buildSlides(){
  const sls=LES[cL].sl; const mi=LES[cL].m;
  document.getElementById('sw').innerHTML=sls.map((s,i)=>{
    const[g1,g2]=(s.bg||'#e5e5ea,#d1d1d6').split(',');
    return`<div class="slide" id="sl-${i}">
      <div class="sv" style="background:linear-gradient(135deg,${g1},${g2})">${renderVis(s.vis)}</div>
      <div class="sb">
        <div class="s-lb" style="color:${MC[mi]}">${t(s.lb)}</div>
        <div class="s-ttl">${t(s.ttl)}</div>
        <div class="s-tx">${t(s.tx)}</div>
      </div>
    </div>`;
  }).join('');
  buildDots();
}

function renderVis(v){
  if(!v) return`<div class="vg"><div class="ve">📖</div></div>`;
  if(v.startsWith('em:')) return`<div class="vg"><div class="ve">${v.slice(3)}</div></div>`;
  if(v.startsWith('chat:')){
    const p=v.slice(5).split(':');
    return`<div class="vg v-chat">${p.map((x,i)=>`<div class="cb ${i%2===0?'u':'a'}">${x}</div>`).join('')}</div>`;
  }
  if(v.startsWith('steps:')){
    const p=v.slice(6).split(':');
    let h='<div class="vg v-stp">';
    p.forEach(x=>{
      if(x==='→'||x==='+') h+=`<div class="sa">${x}</div>`;
      else{ const[ic,...r]=x.split(','); h+=`<div class="si2"><div class="si2-i">${ic}</div><div class="si2-l">${r.join(' ')}</div></div>`; }
    });
    return h+'</div>';
  }
  if(v.startsWith('cmp:')){
    const items=v.slice(4).split(':');
    let h='<div class="vg v-cmp">';
    items.forEach(it=>{ const[ic,nm,sub]=it.split(','); h+=`<div class="cc"><div class="cc-i">${ic}</div><div class="cc-n">${nm}</div><div style="font-size:10px;color:#999">${sub||''}</div></div>`; });
    return h+'</div>';
  }
  if(v.startsWith('ltr:')){
    const p=v.slice(4).split(':');
    return`<div class="vg v-ltr"><div class="lm"><div class="lm-f">${p[0]||''}</div><div>${(p[1]||'').replace(/,/g,'<br>')}</div><br><div>${p[2]||''}</div></div></div>`;
  }
  if(v.startsWith('dc:')){
    const items=v.slice(3).split(':');
    let h='<div class="vg v-dc">';
    items.forEach(it=>{ const[ic,nm,sub]=it.split(','); h+=`<div class="dcard"><div class="dcard-ico">${ic}</div><div><div class="dcard-name">${nm}</div>${sub||''}</div></div>`; });
    return h+'</div>';
  }
  return`<div class="vg"><div class="ve">📖</div></div>`;
}

function buildDots(){
  const n=LES[cL].sl.length;
  document.getElementById('dots').innerHTML=Array.from({length:n},(_,i)=>`<div class="dot" id="d-${i}" onclick="gSlide(${i})"></div>`).join('');
}

function renderSlide(){
  const n=LES[cL].sl.length;
  const u=ui();
  document.querySelectorAll('.slide').forEach(s=>s.classList.remove('on','bk'));
  const sl=document.getElementById(`sl-${cSl}`);
  if(sl){sl.classList.add('on'); if(goB) sl.classList.add('bk');}
  document.querySelectorAll('.dot').forEach((d,i)=>{ d.className='dot'+(i<cSl?' done':i===cSl?' on':''); });
  document.getElementById('spbf').style.width=((cSl+1)/n*100)+'%';
  document.getElementById('btnprev').disabled=cSl===0;
  document.getElementById('btnprev').textContent=u.prev;
  const nb=document.getElementById('btnnext');
  if(cSl===n-1){ nb.textContent=u.fin; nb.onclick=finLesson; }
  else { nb.textContent=u.next; nb.onclick=nextS; }
  goB=false;
}

function nextS(){ const n=LES[cL].sl.length; if(cSl<n-1){cSl++;goB=false;renderSlide();} }
function prevS(){ if(cSl>0){cSl--;goB=true;renderSlide();} }
function gSlide(i){ cSl=i;goB=false;renderSlide(); }

function finLesson(){
  S.w[cL]=true; save(); renderHome(); updStats();
  document.getElementById('sctrl').style.display='none';
  document.getElementById('done-box').style.display='block';
  showToast(ui().toast.done);
}

function backHome(){
  document.getElementById('player').classList.remove('on');
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  document.getElementById('pg-home').classList.add('on');
  document.querySelectorAll('.ntab').forEach((t,i)=>t.classList.toggle('on',i===0));
}

// ══════════════════════════════════════
// QUIZ
// ══════════════════════════════════════
function openQuiz(){ qI=0; qD=false; renderQ(); document.getElementById('qov').classList.add('on'); }
function closeQ(){ document.getElementById('qov').classList.remove('on'); }
function oclose(e){ if(e.target.id==='qov') closeQ(); }

function renderQ(){
  const qs=LES[cL].qz; const q=qs[qI]; const mi=LES[cL].m;
  const u=ui(); const mm=u.mmod;
  document.getElementById('qmod').textContent=u.qlab(mm[mi].tag,qI+1,qs.length);
  document.getElementById('qst').textContent=`${qI+1} / ${qs.length}`;
  document.getElementById('qdts').innerHTML=qs.map((_,i)=>`<div class="qdot${i<qI?' done':i===qI?' on':''}"></div>`).join('');
  document.getElementById('qq').textContent=t(q.q);
  const opts=t(q.os);
  document.getElementById('qos').innerHTML=(Array.isArray(opts)?opts:[]).map((o,i)=>`<button class="qo" onclick="ansQ(${i})">${o}</button>`).join('');
  document.getElementById('qfb').className='qfb';
  document.getElementById('qfb').textContent='';
  const nxt=document.getElementById('qnxt');
  nxt.className='qnext';
  nxt.textContent=qI<qs.length-1?u.qnext:u.qdone;
  qD=false;
}

function ansQ(idx){
  if(qD) return; qD=true;
  const q=LES[cL].qz[qI]; const u=ui();
  document.querySelectorAll('.qo').forEach((o,i)=>{ o.disabled=true; if(i===q.a) o.classList.add('ok'); else if(i===idx) o.classList.add('no'); });
  const fb=document.getElementById('qfb');
  fb.textContent=(idx===q.a?u.ok:u.no)+t(q.h);
  fb.className='qfb '+(idx===q.a?'ok':'no')+' on';
  document.getElementById('qnxt').className='qnext on';
}

function nextQ(){
  const qs=LES[cL].qz;
  if(qI<qs.length-1){ qI++; renderQ(); }
  else { S.q[cL]=true; save(); updStats(); closeQ(); showToast(ui().toast.quiz); renderHome(); }
}

// ══════════════════════════════════════
// PROGRESS
// ══════════════════════════════════════
function renderProg(){
  const mm=ui().mmod;
  document.getElementById('prg-mods').innerHTML=mm.map((m,mi)=>{
    const idxs=LES.map((l,i)=>l.m===mi?i:-1).filter(i=>i>=0);
    const w=idxs.filter(i=>S.w[i]).length;
    const pct=Math.round(w/idxs.length*100);
    return`<div class="mpr">
      <div class="mpr-n" style="background:${MC[mi]}18;color:${MC[mi]}">${mi+1}</div>
      <div class="mpr-info"><div class="mpr-nm">${m.em} ${m.tag}</div><div class="mpr-b"><div class="mpr-f" style="width:${pct}%;background:${MC[mi]}"></div></div></div>
      <div class="mpr-pct" style="color:${MC[mi]}">${pct}%</div>
    </div>`;
  }).join('');
  document.getElementById('prg-les').innerHTML=LES.map((l,i)=>`
    <div class="lmini${S.w[i]?' w':''}">
      <span>${S.w[i]?'✅':'⬜'}</span>
      <span><strong style="color:${MC[l.m]};font-size:11px">${ui().mmod[l.m].tag}</strong> · ${l.ic} ${t(l.t)}</span>
    </div>`).join('');
}

// ══════════════════════════════════════
// PROFILE
// ══════════════════════════════════════
function renderProf(){
  const u=ui();
  document.getElementById('f-name').value=S.p.name||'';
  document.getElementById('f-city').value=S.p.city||'';
  document.getElementById('f-goal').value=S.p.goal||'';
  document.getElementById('pn-d').textContent=S.p.name||u.prof[0];
  document.getElementById('ps-d').textContent=S.p.city||u.prof[1];
  updAva(); renderBadges();
}
function liveN(){ document.getElementById('pn-d').textContent=document.getElementById('f-name').value.trim()||ui().prof[0]; }
function updAva(){
  const nav=document.getElementById('nav-ava'), pa=document.getElementById('pav');
  if(S.ava){ nav.innerHTML=`<img src="${S.ava}">`; pa.innerHTML=`<img src="${S.ava}">`; }
  else { nav.textContent='😊'; pa.textContent='😊'; }
}
function hdlAv(e){
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader(); r.onload=ev=>{S.ava=ev.target.result;save();updAva();}; r.readAsDataURL(f);
}
function saveP(){
  S.p.name=document.getElementById('f-name').value.trim();
  S.p.city=document.getElementById('f-city').value.trim();
  S.p.goal=document.getElementById('f-goal').value.trim();
  save(); renderProf(); showToast(ui().toast.saved);
}
function renderBadges(){
  const bd=ui().badges;
  document.getElementById('bgs').innerHTML=bd.map(b=>`
    <div class="bg${S.b[b.k]?' e':''}">
      <div class="bi">${b.ic}</div>
      <div class="bn2">${b.nm}</div>
    </div>`).join('');
}

// ══════════════════════════════════════
// BADGES
// ══════════════════════════════════════
function chkBadges(w,q,tot){
  let ch=false;
  function earn(k,msg){ if(!S.b[k]){S.b[k]=true;ch=true;setTimeout(()=>showToast('🏅 '+msg),400);} }
  if(w>=1) earn('first',ui().badges[0].nm+'!');
  [0,1,2,3].forEach(mi=>{ const idxs=LES.map((l,i)=>l.m===mi?i:-1).filter(i=>i>=0); if(idxs.every(i=>S.w[i])) earn('m'+mi,ui().mmod[mi].tag+'!'); });
  if(q>=1) earn('fq',ui().badges[5].nm+'!');
  if(q>=LES.length) earn('aq',ui().badges[6].nm+'!');
  if(w>=tot) earn('cd','🎓 '+ui().badges[7].nm+'!');
  if(ch){ save(); renderBadges(); }
}

// ══════════════════════════════════════
// TOAST
// ══════════════════════════════════════
let tT;
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('on');
  clearTimeout(tT); tT=setTimeout(()=>t.classList.remove('on'),2800);
}
